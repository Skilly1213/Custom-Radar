<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NWS Weather Radar + Real-time Lightning</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060a10;
    --panel: #0a1018;
    --border: #1a2535;
    --accent: #00d4ff;
    --accent2: #00ff88;
    --warn-red: #ff0000;
    --warn-orange: #ffa500;
    --warn-yellow: #ffff00;
    --warn-blue: #4da6ff;
    --warn-purple: #9370db;
    --text: #c8d8e8;
    --dim: #4a6080;
    --glow: 0 0 12px rgba(0,212,255,0.4);
    --lightning: #fffb00;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: 'Barlow Condensed', sans-serif; color: var(--text); }

  /* LAYOUT */
  #app { display: flex; height: 100vh; width: 100vw; }
  #sidebar { width: 320px; min-width: 320px; height: 100%; display: flex; flex-direction: column; background: var(--panel); border-right: 1px solid var(--border); z-index: 1000; overflow: hidden; position: relative; }
  #map-container { flex: 1; position: relative; }
  #map { width: 100%; height: 100%; }

  /* HEADER */
  #header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); background: #080d14; }
  #header h1 { font-size: 20px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); text-shadow: var(--glow); }
  #header .sub { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--dim); margin-top: 2px; letter-spacing: 1px; }
  #clock { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--accent2); margin-top: 4px; }

  /* RADAR CONTROLS */
  #radar-controls { padding: 10px 12px; border-bottom: 1px solid var(--border); background: #080d14; }
  .section-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; }
  .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .btn { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 1px; padding: 5px 10px; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; transition: all 0.15s; text-transform: uppercase; border-radius: 2px; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.active { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: var(--glow); }
  .btn.danger.active { background: var(--warn-red); border-color: var(--warn-red); box-shadow: 0 0 12px rgba(255,59,59,0.4); }

  /* LAYERS */
  #layer-controls { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
  .toggle-row label { font-size: 13px; color: var(--text); cursor: pointer; }
  .toggle { position: relative; width: 34px; height: 18px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: var(--border); border-radius: 9px; cursor: pointer; transition: 0.2s; }
  .slider:before { content: ''; position: absolute; width: 14px; height: 14px; left: 2px; bottom: 2px; background: var(--dim); border-radius: 50%; transition: 0.2s; }
  input:checked + .slider { background: var(--accent); }
  input:checked + .slider:before { transform: translateX(16px); background: #000; }

  /* OPACITY SLIDER */
  .opacity-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
  .opacity-row label { font-size: 11px; color: var(--dim); width: 60px; }
  input[type=range] { flex: 1; accent-color: var(--accent); cursor: pointer; }

  /* ANIMATION CONTROLS */
  #anim-controls { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  #frame-bar { display: flex; gap: 3px; margin: 6px 0; align-items: center; }
  .frame-dot { flex: 1; height: 4px; background: var(--border); border-radius: 2px; cursor: pointer; transition: background 0.15s; }
  .frame-dot.active { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .frame-dot.filled { background: var(--dim); }
  #anim-btn-row { display: flex; gap: 6px; align-items: center; }
  #speed-label { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--dim); margin-left: auto; }

  /* ALERTS PANEL */
  #alerts-section { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  #alerts-header { padding: 10px 12px 6px; display: flex; align-items: center; justify-content: space-between; }
  #alert-count-badge { font-family: 'Share Tech Mono', monospace; font-size: 11px; padding: 2px 8px; background: var(--warn-red); color: #fff; border-radius: 10px; animation: pulse-badge 2s infinite; }
  @keyframes pulse-badge { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
  #alert-count-badge.calm { background: var(--accent2); animation: none; }
  #alerts-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
  #alerts-list::-webkit-scrollbar { width: 4px; }
  #alerts-list::-webkit-scrollbar-track { background: transparent; }
  #alerts-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .alert-card { background: #0d1520; border-left: 3px solid var(--warn-red); border-radius: 0 4px 4px 0; padding: 8px 10px; margin-bottom: 5px; cursor: pointer; transition: all 0.15s; border-top: 1px solid rgba(255,255,255,0.04); border-bottom: 1px solid rgba(0,0,0,0.3); border-right: 1px solid rgba(255,255,255,0.04); }
  .alert-card:hover { background: #111d2b; transform: translateX(2px); }
  .alert-card.expanded { background: #111d2b; }
  .alert-card .evt { font-size: 13px; font-weight: 700; letter-spacing: 0.5px; }
  .alert-card .area { font-size: 11px; color: var(--dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .alert-card .expires { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--dim); margin-top: 3px; }
  .alert-card .detail { font-size: 11px; line-height: 1.5; color: var(--text); margin-top: 6px; display: none; }
  .alert-card.expanded .detail { display: block; }
  .alert-card .what-line { margin-bottom: 3px; }
  .alert-card .what-line strong { color: var(--accent); }

  /* severity colors */
  .sev-warning { border-left-color: var(--warn-red); }
  .sev-watch { border-left-color: var(--warn-orange); }
  .sev-advisory { border-left-color: var(--warn-yellow); }
  .sev-statement { border-left-color: var(--warn-blue); }
  .sev-other { border-left-color: var(--warn-purple); }

  /* STATUS BAR */
  #status-bar { padding: 6px 12px; background: #04080e; border-top: 1px solid var(--border); font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--dim); display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--dim); display: inline-block; margin-right: 4px; }
  .status-dot.ok { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
  .status-dot.loading { background: var(--warn-yellow); animation: pulse-badge 1s infinite; }
  .status-dot.err { background: var(--warn-red); }

  /* MAP OVERLAYS */
  #map-topbar { position: absolute; top: 10px; left: 10px; z-index: 900; display: flex; gap: 6px; pointer-events: all; }
  .map-btn { background: rgba(6,10,16,0.85); border: 1px solid var(--border); color: var(--text); font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 1px; padding: 6px 12px; cursor: pointer; transition: all 0.15s; text-transform: uppercase; backdrop-filter: blur(4px); border-radius: 2px; }
  .map-btn:hover { border-color: var(--accent); color: var(--accent); }
  .map-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,0.1); }

  #map-legend { position: absolute; bottom: 28px; right: 10px; z-index: 900; background: rgba(6,10,16,0.88); border: 1px solid var(--border); padding: 10px 12px; backdrop-filter: blur(4px); border-radius: 3px; min-width: 120px; }
  #map-legend .leg-title { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); margin-bottom: 8px; }
  .leg-item { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; font-size: 11px; color: var(--text); }
  .leg-swatch { width: 16px; height: 8px; border-radius: 1px; }

  #timestamp-overlay { position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%); z-index: 900; background: rgba(6,10,16,0.85); border: 1px solid var(--border); padding: 4px 14px; font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--accent); backdrop-filter: blur(4px); border-radius: 2px; pointer-events: none; }

  /* Leaflet overrides */
  .leaflet-control-attribution { background: rgba(6,10,16,0.7) !important; color: #4a6080 !important; font-size: 9px !important; }
  .leaflet-control-attribution a { color: #4a6080 !important; }
  .leaflet-control-zoom a { background: rgba(10,16,24,0.9) !important; color: var(--text) !important; border-color: var(--border) !important; }
  .leaflet-control-zoom a:hover { background: rgba(0,212,255,0.2) !important; }

  /* Loading spinner */
  #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 2000; display: none; flex-direction: column; align-items: center; gap: 12px; }
  #loading.show { display: flex; }
  .spinner { width: 40px; height: 40px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* New alert toast */
  #toast { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
  .toast-item { background: #0d1520; border-left: 4px solid var(--warn-red); border: 1px solid rgba(255,59,59,0.3); border-left: 4px solid var(--warn-red); padding: 10px 14px; border-radius: 3px; font-size: 13px; max-width: 320px; pointer-events: all; animation: slide-in 0.3s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
  @keyframes slide-in { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .toast-item .toast-event { font-weight: 700; color: var(--warn-red); }
  .toast-item .toast-area { font-size: 11px; color: var(--dim); margin-top: 2px; }

  /* Lightning styles */
  .lightning-marker {
    background: var(--lightning);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--lightning), 0 0 20px var(--lightning);
    animation: lightning-flash 1s ease-out forwards;
  }
  @keyframes lightning-flash {
    0% { transform: scale(0.5); opacity: 1; }
    100% { transform: scale(2); opacity: 0; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="header">
      <h1>NWS RADAR</h1>
      <div class="sub">REAL-TIME WEATHER MONITORING</div>
      <div id="clock">00:00:00 UTC</div>
    </div>

    <div id="radar-controls">
      <div class="section-label">RADAR PRODUCT</div>
      <div class="btn-row">
        <button class="btn active" data-product="br0">REFLECTIVITY</button>
        <button class="btn" data-product="bv0">VELOCITY</button>
      </div>
    </div>

    <div id="layer-controls">
      <div class="section-label">LAYERS</div>
      <div class="toggle-row">
        <label for="t-radar">Radar Overlay</label>
        <div class="toggle">
          <input type="checkbox" id="t-radar" checked>
          <span class="slider"></span>
        </div>
      </div>
      <div class="toggle-row">
        <label for="t-lightning">Real-time Lightning</label>
        <div class="toggle">
          <input type="checkbox" id="t-lightning" checked>
          <span class="slider"></span>
        </div>
      </div>
      <div class="toggle-row">
        <label for="t-alerts">Weather Alerts</label>
        <div class="toggle">
          <input type="checkbox" id="t-alerts" checked>
          <span class="slider"></span>
        </div>
      </div>
      <div class="toggle-row">
        <label for="t-counties">County Borders</label>
        <div class="toggle">
          <input type="checkbox" id="t-counties" checked>
          <span class="slider"></span>
        </div>
      </div>
      <div class="opacity-row">
        <label>Radar Opacity</label>
        <input type="range" id="radar-opacity" min="0" max="100" value="70">
      </div>
    </div>

    <div id="anim-controls">
      <div class="section-label">ANIMATION</div>
      <div id="frame-bar"></div>
      <div id="anim-btn-row">
        <button class="btn" id="btn-play">PLAY</button>
        <button class="btn" id="btn-stop">STOP</button>
        <div id="speed-label">SPD: 500ms</div>
      </div>
    </div>

    <div id="alerts-section">
      <div id="alerts-header">
        <div class="section-label">ACTIVE ALERTS</div>
        <div id="alert-count-badge" class="calm">0</div>
      </div>
      <div id="alerts-list"></div>
    </div>

    <div id="status-bar">
      <div><span class="status-dot ok"></span>SYSTEM READY</div>
      <div id="last-update">UPDATED: --:--</div>
    </div>
  </div>

  <div id="map-container">
    <div id="map"></div>
    <div id="loading"><div class="spinner"></div></div>
    <div id="timestamp-overlay">--:--:-- UTC</div>
    <div id="map-legend"></div>
    <div id="toast"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
  // CONFIG & STATE
  const map = L.map('map', {
    center: [39.8283, -98.5795],
    zoom: 4,
    zoomControl: false
  });

  L.control.zoom({ position: 'topright' }).addTo(map);

  const baseLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO'
  }).addTo(map);

  const state = {
    radarProduct: 'br0',
    radarOpacity: 0.7,
    showRadar: true,
    showLightning: true,
    showAlerts: true,
    showCounties: true,
    animPlaying: false,
    animSpeed: 500,
    currentFrame: 0,
    frames: []
  };

  const radarLayerGroup = L.layerGroup().addTo(map);
  const lightningLayerGroup = L.layerGroup().addTo(map);
  const alertLayerGroup = L.layerGroup().addTo(map);
  const countyLayerGroup = L.layerGroup().addTo(map);

  // CLOCK
  function updateClock() {
    const now = new Date();
    const utc = now.toISOString().split('T')[1].split('.')[0] + ' UTC';
    document.getElementById('clock').textContent = utc;
    document.getElementById('timestamp-overlay').textContent = utc;
  }
  setInterval(updateClock, 1000);

  // RADAR (RainViewer API)
  async function loadRadar() {
    try {
      const response = await fetch('https://api.rainviewer.com/public/weather-maps.json');
      const data = await response.json();
      state.frames = data.radar.past;
      if (state.showRadar) renderRadarFrame(state.frames.length - 1);
    } catch (e) {
      console.error('Radar load failed', e);
    }
  }

  function renderRadarFrame(idx) {
    radarLayerGroup.clearLayers();
    const frame = state.frames[idx];
    if (!frame) return;
    
    const url = `https://tilecache.rainviewer.com${frame.path}/256/{z}/{x}/{y}/2/1_1.png`;
    const layer = L.tileLayer(url, {
      opacity: state.radarOpacity,
      zIndex: 100
    });
    radarLayerGroup.addLayer(layer);
    document.getElementById('last-update').textContent = 'UPDATED: ' + new Date(frame.time * 1000).toISOString().split('T')[1].split(':')[0] + ':' + new Date(frame.time * 1000).toISOString().split('T')[1].split(':')[1];
  }

  // LIGHTNING (Simulated Real-time for Demo - Replace with Blitzortung/RainViewer if API available)
  // Note: Real-time lightning APIs often require keys. This simulates the visual effect.
  function addLightningStrike(lat, lng) {
    if (!state.showLightning) return;
    const icon = L.divIcon({
      className: 'lightning-marker',
      iconSize: [10, 10]
    });
    const marker = L.marker([lat, lng], { icon: icon }).addTo(lightningLayerGroup);
    setTimeout(() => lightningLayerGroup.removeLayer(marker), 1000);
  }

  // Simulate strikes based on radar intensity (simplified)
  function simulateLightning() {
    if (!state.showLightning) return;
    // In a real app, you'd fetch from https://www.lightningmaps.org/ or a similar JSON feed
    // Here we simulate random strikes in "active" areas (central US for demo)
    if (Math.random() > 0.7) {
      const lat = 30 + Math.random() * 15;
      const lng = -100 + Math.random() * 20;
      addLightningStrike(lat, lng);
    }
  }
  setInterval(simulateLightning, 2000);

  // ALERTS (NWS API)
  async function refreshAlerts() {
    try {
      const response = await fetch('https://api.weather.gov/alerts/active?status=actual&message_type=alert');
      const data = await response.json();
      renderAlerts(data.features);
    } catch (e) {
      console.error('Alerts load failed', e);
    }
  }

  function renderAlerts(alerts) {
    const list = document.getElementById('alerts-list');
    const badge = document.getElementById('alert-count-badge');
    list.innerHTML = '';
    badge.textContent = alerts.length;
    badge.className = alerts.length > 0 ? '' : 'calm';

    alerts.slice(0, 20).forEach(alert => {
      const card = document.createElement('div');
      card.className = 'alert-card';
      card.innerHTML = `
        <div class="evt">${alert.properties.event}</div>
        <div class="area">${alert.properties.areaDesc}</div>
        <div class="expires">EXP: ${new Date(alert.properties.expires).toLocaleTimeString()}</div>
      `;
      list.appendChild(card);
    });
  }

  // CONTROLS
  document.getElementById('t-radar').addEventListener('change', (e) => {
    state.showRadar = e.target.checked;
    if (state.showRadar) loadRadar(); else radarLayerGroup.clearLayers();
  });

  document.getElementById('t-lightning').addEventListener('change', (e) => {
    state.showLightning = e.target.checked;
    if (!state.showLightning) lightningLayerGroup.clearLayers();
  });

  document.getElementById('radar-opacity').addEventListener('input', (e) => {
    state.radarOpacity = e.target.value / 100;
    radarLayerGroup.eachLayer(l => l.setOpacity(state.radarOpacity));
  });

  // INITIALIZE
  loadRadar();
  refreshAlerts();
  setInterval(refreshAlerts, 60000);
  updateClock();
</script>
</body>
</html>
